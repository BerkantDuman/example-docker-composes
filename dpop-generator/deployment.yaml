---
# ConfigMap for environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: dpop-generator-config
  labels:
    app: dpop-generator
data:
  PORT: "5000"
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dpop-generator
  labels:
    app: dpop-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dpop-generator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: dpop-generator
    spec:
      containers:
      - name: dpop-generator
        image: ${IMAGE_REGISTRY}/iam-client-mock/dpop-generator:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
        envFrom:
        - configMapRef:
            name: dpop-generator-config
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
# Service to expose the application
apiVersion: v1
kind: Service
metadata:
  name: dpop-generator
  labels:
    app: dpop-generator
spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
    name: http
  selector:
    app: dpop-generator

---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dpop-generator
  labels:
    app: dpop-generator
  annotations:
spec:
  rules:
  - host: dpop-generator.{{HOSTNAME}}  # Replace with your actual domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dpop-generator
            port:
              number: 5000