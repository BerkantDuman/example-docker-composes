receivers:
  otlp:
    protocols:
      http:
        endpoint: collector:4318
      grpc:
        endpoint: collector:4317
processors:
  transform/parse_json_body_2:
    error_mode: ignore
    log_statements:
      - context: log
        conditions:
          - body != nil and Substring(body, 0, 2) == "{\""
        statements:
          - set(body, ParseJSON(body))
  filter/remove_calico:
      error_mode: ignore
      logs:
        log_record:
          - 'not IsMatch(attributes["client-tag"], "abc")'
  filter/my_filter:
      error_mode: ignore
      logs:
        log_record:
          - 'not IsMatch(body, "client-tag\":\"mustafa\"")'
      

  # batch metrics before sending to reduce API usage
  batch:
exporters:
  debug:
    verbosity: detailed
  zipkin:
    endpoint: "http://zipkin:9411/api/v2/spans"
    format: proto
  prometheus:
    endpoint: "0.0.0.0:8889"



extensions:
  # responsible for responding to health check calls on behalf of the collector.
  health_check:
  # fetches the collector’s performance data
  pprof:
  # serves as an http endpoint that provides live debugging data about instrumented components.
  zpages:
service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [transform/parse_json_body_2]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]